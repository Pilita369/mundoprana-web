name: 🚀 Deploy automático por FTP

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    name: Subida vía FTP
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Subir al servidor vía FTP
        run: |
          lftp -e "
            set ftp:passive-mode true;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            open ftp://${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}@${{ secrets.FTP_HOST }};
            mirror --reverse --verbose --exclude .git/ ./ /public_html/mundoprana/;
            find /public_html/mundoprana/ -type d -exec chmod 755 {} \;;
            find /public_html/mundoprana/ -type f -exec chmod 644 {} \;;
            quit
          "